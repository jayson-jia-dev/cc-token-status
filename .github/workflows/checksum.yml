name: Update checksum

on:
  push:
    branches: [main]
    paths: ['cc-token-stats.5m.py']

permissions:
  contents: write

jobs:
  checksum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SHA256
        run: sha256sum cc-token-stats.5m.py > checksum.sha256

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum.sha256
          git diff --cached --quiet || git commit -m "chore: update checksum.sha256 [skip ci]"
          git push
